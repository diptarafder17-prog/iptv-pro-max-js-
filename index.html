<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Open Live TV</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0B6EF6" />
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="/icons/icon-512.png" />
  <meta name="description" content="Landing page that redirects to a live TV stream." />
  <style>
    :root{
      --bg:#07101a; --card:#0b1220; --primary:#0B6EF6; --accent:#FF6B6B;
      --text:#E6EEF8; --muted:#9FB3C8; --radius:12px; --gap:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,var(--bg),#041018);color:var(--text);-webkit-font-smoothing:antialiased}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:720px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:28px;border-radius:var(--radius);box-shadow:0 10px 40px rgba(2,6,23,0.7);text-align:center}
    .brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:8px}
    .logo{width:72px;height:72px;border-radius:12px;flex:0 0 72px}
    h1{margin:0;font-size:22px}
    .subtitle{margin:6px 0 18px;color:var(--muted)}
    .lead{font-size:16px;color:var(--muted);margin:0 0 18px}
    .count{font-weight:700;color:var(--primary);display:inline-block;min-width:28px;text-align:center}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:12px;text-decoration:none;font-weight:700;cursor:pointer;border:0}
    .btn.primary{background:linear-gradient(90deg,var(--primary),#0a5fe0);color:#fff;box-shadow:0 6px 18px rgba(11,110,246,0.18)}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
    .btn:focus{outline:none;box-shadow:0 0 0 4px rgba(11,110,246,0.18)}
    .muted{color:var(--muted);font-size:13px;margin-top:14px}
    a.link{color:var(--accent);text-decoration:underline}
    footer{margin-top:18px;color:var(--muted);font-size:13px}
    @media (min-width:900px){
      h1{font-size:26px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card" role="main" aria-labelledby="title">
      <div class="brand" aria-hidden="false">
        <img class="logo" src="/icons/icon-192.png" alt="Open Live TV logo">
        <div>
          <h1 id="title">Open Live TV</h1>
          <div class="subtitle">Fast redirect to the live stream</div>
        </div>
      </div>

      <p class="lead">You will be redirected in <span id="count" class="count" aria-live="polite">5</span> seconds.</p>

      <div class="actions">
        <a id="openBtn" class="btn primary" href="https://toffeelive.com/en/watch/sy5m-JQBv9knK3AHYTTk">Open Now</a>
        <a class="btn ghost" href="privacy.html">Privacy</a>
      </div>

      <p class="muted">If the redirect does not work, use this link: <a class="link" href="https://toffeelive.com/en/watch/sy5m-JQBv9knK3AHYTTk">Open stream</a></p>

      <footer>
        <div>Streaming provided by the source site. Contact: <a class="link" href="mailto:webmaster@example.com">webmaster@example.com</a></div>
      </footer>
    </main>
  </div>

  <script>
    (function(){
      const target = 'https://toffeelive.com/en/watch/sy5m-JQBv9knK3AHYTTk';
      let seconds = 5;
      const el = document.getElementById('count');
      const openBtn = document.getElementById('openBtn');

      if (!el) return;
      el.textContent = seconds;

      const timer = setInterval(() => {
        seconds--;
        el.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          // replace avoids adding history entry
          window.location.replace(target);
        }
      }, 1000);

      // Immediate open on click or keyboard activation
      if (openBtn) {
        openBtn.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = target;
        });
        openBtn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.location.href = target;
          }
        });
      }
    })();
  </script>
</body>
</html>
